<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Spatula cursor">
  <defs>
    <linearGradient id="metalGradient" x1="2" y1="2" x2="44" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC"/>
      <stop offset="0.38" stop-color="#D7DEE8"/>
      <stop offset="0.72" stop-color="#AEB9C7"/>
      <stop offset="1" stop-color="#EEF2F7"/>
    </linearGradient>

    <linearGradient id="woodGradient" x1="26" y1="28" x2="62" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B87942"/>
      <stop offset="0.52" stop-color="#8B5129"/>
      <stop offset="1" stop-color="#5E351E"/>
    </linearGradient>

    <linearGradient id="shadowGradient" x1="10" y1="10" x2="55" y2="55" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- subtle outline/shadow for cursor visibility -->
  <g id="cursor-shadow" fill="none" stroke="#0F172A" stroke-opacity="0.35" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <path d="M1.1 1.1 L38.5 12.2 L26.9 26.7 L62.1 55.6 L55.7 62.1 L26.7 26.9 L12.2 38.5 Z"/>
  </g>

  <!-- metallic blade -->
  <g id="metal-blade">
    <path
      d="M0 0 L38 11.3 C39.7 11.8 40.3 13.9 39.2 15.2 L26.1 30.5 C25 31.8 23 31.3 22.5 29.7 L0 0 Z"
      fill="url(#metalGradient)"
      stroke="#667085"
      stroke-width="1"
      stroke-linejoin="round"
    />
    <path
      d="M0 0 L28.6 12.8 L20.7 21.5 Z"
      fill="#FFFFFF"
      fill-opacity="0.34"
    />
  </g>

  <!-- metal neck / ferrule -->
  <g id="metal-ferrule">
    <path
      d="M23.8 27.2 L28.2 22.8 L35.9 30.5 L31.2 35.2 Z"
      fill="#C9D2DE"
      stroke="#6B7280"
      stroke-width="1"
      stroke-linejoin="round"
    />
    <path
      d="M27.2 24.4 L34.3 31.5"
      stroke="#F8FAFC"
      stroke-opacity="0.75"
      stroke-width="1.2"
      stroke-linecap="round"
    />
  </g>

  <!-- wooden handle -->
  <g id="wooden-handle">
    <path
      d="M32.2 33.2 C34.2 31.2 37.4 31.2 39.4 33.2 L61.6 55.4 C63.2 57 63.2 59.6 61.6 61.2 L61.2 61.6 C59.6 63.2 57 63.2 55.4 61.6 L33.2 39.4 C31.2 37.4 31.2 35.2 32.2 33.2 Z"
      fill="url(#woodGradient)"
      stroke="#4A2B18"
      stroke-width="1"
      stroke-linejoin="round"
    />
    <path
      d="M36.1 34.8 L60.2 58.9"
      stroke="#D69A61"
      stroke-opacity="0.6"
      stroke-width="1.4"
      stroke-linecap="round"
    />
    <path
      d="M34.4 39.8 L55.5 61"
      stroke="#3D2415"
      stroke-opacity="0.38"
      stroke-width="1.2"
      stroke-linecap="round"
    />
  </g>

  <!-- highlights and soft inner shadow -->
  <g id="highlights-and-shadows">
    <path
      d="M8.6 5.1 L34.7 12.9"
      stroke="#FFFFFF"
      stroke-opacity="0.55"
      stroke-width="1.3"
      stroke-linecap="round"
    />
    <path
      d="M18.5 26.3 L25.8 29.7"
      stroke="url(#shadowGradient)"
      stroke-width="2"
      stroke-linecap="round"
    />
    <circle cx="37.2" cy="36.9" r="1.7" fill="#3B2417" fill-opacity="0.45"/>
  </g>
</svg>
